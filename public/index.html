<div id="setup-screen">
    <div id="waiting-msg" style="text-align: center; padding: 20px; background: #eee;">
        対戦相手を待っています...
    </div>

    <div id="host-panel" style="display:none; padding: 10px; background: #fff3cd; border-bottom: 2px solid #ffeeba;">
        <label>拠点HP: <input type="number" id="rule-hp" value="2000" onchange="syncRules()"></label>
        <label>MP回復速度: <input type="number" id="rule-mp" value="0.22" step="0.05" onchange="syncRules()"></label>
        <span style="color: #856404; font-size: 12px; margin-left: 10px;">※あなたはホストです</span>
    </div>

    <div class="footer-area">
        <button id="start-btn" onclick="requestStart()" style="display:none;">バトル開始 🔥</button>
        <div id="guest-msg" style="display:none;">ホストが開始するのを待っています...</div>
    </div>
</div>
