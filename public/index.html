<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji Tactics Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #1b3d17; font-family: sans-serif; }
        canvas { display: none; width: 100vw; height: 100vh; background: #1b3d17; }
        #setup-screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: #fdfdfd; z-index: 50; }
        .host-controls { background: #fff3cd; padding: 10px; border-bottom: 2px solid #ffeeba; text-align: center; font-size: 13px; }
        .setup-container { display: flex; flex: 1; overflow: hidden; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        .p2-setup { background: #fff1f1; border-right: 1px solid #ddd; }
        .p1-setup { background: #f1f7ff; }
        .unit-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; max-width: 180px; }
        .unit-card { height: 60px; border: 2px solid #ddd; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; position: relative; cursor: pointer; font-size: 11px; }
        .selected { border-color: #ff9f43 !important; background: #fffbf0; box-shadow: 0 0 5px orange; }
        .cost { position: absolute; top: -5px; right: -5px; background: #f1c40f; padding: 1px 4px; border-radius: 4px; font-weight: bold; border: 1px solid #b8860b; font-size: 10px; color: black; }
        .footer-area { height: 100px; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top: 1px solid #ddd; gap: 5px; }
        #start-btn { padding: 12px 50px; font-size: 18px; background: #ccc; color: #888; border: none; border-radius: 25px; font-weight: bold; display: none; }
        #start-btn.ready { background: linear-gradient(135deg, #ff9f43, #ff6b6b); color: white; cursor: pointer; }
        #ui { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 30; }
        .side-bar { position: absolute; top: 0; bottom: 0; width: 90px; display: flex; align-items: center; pointer-events: auto; }
        .p2-bar { left: 5px; } .p1-bar { right: 5px; flex-direction: row-reverse; }
        .slots { display: flex; flex-direction: column; gap: 8px; }
        .slot { width: 65px; height: 55px; background: rgba(255,255,255,0.9); border: 2px solid #ccc; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .slot.active { border-color: #333 !important; transform: scale(1.1); background: #fff; }
        .mp-bar { width: 12px; height: 280px; background: rgba(0,0,0,0.5); border-radius: 6px; position: relative; margin: 0 10px; overflow: hidden; }
        .mp-fill { position: absolute; bottom: 0; width: 100%; transition: height 0.1s; }
        #base-hp { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; gap: 30px; }
        .hp-box { width: 35%; height: 12px; background: rgba(0,0,0,0.6); border: 1.5px solid #fff; border-radius: 6px; overflow: hidden; }
        #result-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div id="host-panel" class="host-controls" style="display:none;">
        <b>【ホスト権限】</b> 
        拠点HP: <input type="number" id="rule-hp" value="2000" style="width:60px" onchange="syncRules()"> 
        回復速度: <input type="number" id="rule-mp" value="0.22" step="0.05" style="width:50px" onchange="syncRules()">
    </div>
    <div id="status-msg" style="text-align:center; padding:5px; background:#eee; font-size:12px;">相手の接続を待っています...</div>
    
    <div class="setup-container">
        <div class="player-side p2-setup"><h3>RED TEAM</h3><div class="unit-grid" id="grid2"></div></div>
        <div class="player-side p1-setup"><h3>BLUE TEAM</h3><div class="unit-grid" id="grid1"></div></div>
    </div>
    
    <div class="footer-area">
        <button id="start-btn" onclick="requestStart()">バトル開始 🔥</button>
        <div id="guest-wait-msg" style="display:none; color:#666;">ホストが開始するのを待っています...</div>
        <div id="deck-msg" style="font-size:12px; color:red;">お互いに5枚選んでください</div>
    </div>
</div>

<div id="ui">
    <div id="base-hp">
        <div class="hp-box"><div id="hp2-fill" style="width:100%; height:100%; background:#ff4757;"></div></div>
        <div class="hp-box"><div id="hp1-fill" style="width:100%; height:100%; background:#2e86de;"></div></div>
    </div>
    <div class="side-bar p2-bar"><div class="slots" id="slots2"></div><div class="mp-bar"><div id="mp2-fill" class="mp-fill" style="background:#ff4757;"></div></div></div>
    <div class="side-bar p1-bar"><div class="slots" id="slots1"></div><div class="mp-bar"><div id="mp1-fill" class="mp-fill" style="background:#2e86de;"></div></div></div>
</div>

<div id="result-screen">
    <div id="result-title">RESULT</div>
    <button onclick="location.reload()" style="padding:10px 20px; margin-top:20px;">リロードして再戦</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const socket = io();
const EMOJI = { "速":"🏃", "重":"🐘", "乱":"🐝", "砲":"💣", "突":"🏎️", "盾":"🛡️", "爆":"🧨", "氷":"❄️", "雷":"⚡", "影":"👻", "obs":"🪨" };
const ALL_UNITS = [
    { name: "速", speed: 1.3, radius: 12, hp: 80, atk: 12, interval: 40, cost: 15, range: 0.35 },
    { name: "重", speed: 0.35, radius: 25, hp: 450, atk: 45, interval: 80, cost: 70, range: 0.25 },
    { name: "乱", speed: 1.0, radius: 10, hp: 45, atk: 8, interval: 45, cost: 12, range: 0.4, jitter: true },
    { name: "砲", speed: 0.1, radius: 20, hp: 160, atk: 85, interval: 170, cost: 85, range: 0.15, isCannon: true },
    { name: "突", speed: 2.6, radius: 12, hp: 60, atk: 25, interval: 35, cost: 35, range: 0.5 },
    { name: "盾", speed: 0.25, radius: 28, hp: 1000, atk: 5, interval: 100, cost: 75, range: 0.2 },
    { name: "爆", speed: 1.9, radius: 13, hp: 35, atk: 500, interval: 1, cost: 55, range: 0.45, isBomb: true },
    { name: "氷", speed: 0.7, radius: 16, hp: 130, atk: 7, interval: 70, cost: 40, range: 0.35 },
    { name: "雷", speed: 0.6, radius: 15, hp: 110, atk: 70, interval: 110, cost: 65, range: 0.25, isCannon: true },
    { name: "影", speed: 1.1, radius: 12, hp: 70, atk: 12, interval: 45, cost: 30, range: 0.4 }
];

let myRole = 0, isHost = false, gameRunning = false, mpRegen = 0.22, baseMaxHp = 2000;
let p1Deck = [], p2Deck = [], units = [], bullets = [], obstacles = [], effects = [], gameTime = 0;
const players = { 1: { hp: 2000, mp: 40, selected: 0, deck: [] }, 2: { hp: 2000, mp: 40, selected: 0, deck: [] } };
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');

// Socket通信
socket.on('init_role', data => {
    myRole = data.role; isHost = data.isHost;
    if(isHost) document.getElementById('host-panel').style.display = 'block';
    applyRules(data.rules);
});

socket.on('player_joined', d => {
    document.getElementById('status-msg').innerText = "対戦相手が接続しました！準備してください。";
    if(isHost) document.getElementById('start-btn').style.display = 'block';
    else document.getElementById('guest-wait-msg').style.display = 'block';
});

socket.on('rules_updated', applyRules);
socket.on('game_start', startGame);
socket.on('spawn', data => {
    const type = ALL_UNITS.find(u => u.name === data.name);
    units.push(new Unit(canvas.width - data.x, data.y, data.owner, type));
});

function applyRules(r) {
    baseMaxHp = r.hp; mpRegen = r.mpRegen;
    players[1].hp = players[2].hp = r.hp;
}

function syncRules() {
    if(!isHost) return;
    socket.emit('update_rules', { hp: parseInt(document.getElementById('rule-hp').value), mpRegen: parseFloat(document.getElementById('rule-mp').value) });
}

// デッキ選択UI生成
[1, 2].forEach(pID => {
    const grid = document.getElementById('grid' + pID);
    ALL_UNITS.forEach((u, i) => {
        const card = document.createElement('div'); card.className = 'unit-card';
        card.innerHTML = `<span class="cost">${u.cost}</span><span style="font-size:22px">${EMOJI[u.name]}</span><b>${u.name}</b>`;
        card.onclick = () => {
            if(myRole !== pID) return;
            const deck = pID === 1 ? p1Deck : p2Deck;
            if (deck.includes(i)) deck.splice(deck.indexOf(i),1); else if (deck.length < 5) deck.push(i);
            card.classList.toggle('selected', deck.includes(i));
            document.getElementById('start-btn').className = (p1Deck.length===5 && p2Deck.length===5) ? 'ready' : '';
        };
        grid.appendChild(card);
    });
});

function requestStart() {
    if(p1Deck.length===5 && p2Deck.length===5) socket.emit('request_start');
}

function startGame() {
    gameRunning = true; document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('ui').style.display = 'block'; canvas.style.display = 'block';
    players[1].deck = p1Deck.map(i => ALL_UNITS[i]); players[2].deck = p2Deck.map(i => ALL_UNITS[i]);
    resize(); initBattleUI(); loop();
}

function initBattleUI() {
    [1, 2].forEach(id => {
        const container = document.getElementById('slots' + id); container.innerHTML = '';
        players[id].deck.forEach((u, i) => {
            const slot = document.createElement('div'); slot.className = `slot ${i===players[id].selected?'active':''}`;
            slot.innerHTML = `<span class="cost" style="font-size:8px;top:-3px;right:-3px;">${u.cost}</span><span style="font-size:22px">${EMOJI[u.name]}</span>`;
            if(id === myRole) slot.onclick = () => { players[id].selected = i; Array.from(container.children).forEach((s, idx) => s.classList.toggle('active', idx === i)); };
            container.appendChild(slot);
        });
    });
}

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const w = canvas.width, h = canvas.height;
    obstacles = [{x:w/2, y:h/2, r:55, hp:1000}, {x:w/2, y:h*0.25, r:35, hp:600}, {x:w/2, y:h*0.75, r:35, hp:600}].map(o => ({ ...o, maxHp: o.hp, active: true, timer: 0 }));
}

class Unit {
    constructor(x, y, owner, type) {
        this.x = x; this.y = y; this.owner = owner; this.type = {...type};
        this.hp = type.hp; this.maxHp = type.hp; this.active = true;
        this.vx = (owner === 2) ? type.speed : -type.speed;
        this.vy = 0; this.cooldown = 0; this.target = null;
    }
    update() {
        if (this.target && !this.target.active) this.target = null;
        let blocked = false;
        obstacles.forEach(o => { if (o.active && Math.hypot(this.x-o.x, this.y-o.y) < this.type.radius + o.r + 5) { blocked = true; this.target = o; } });
        if (!this.target) units.forEach(u => { if(u.owner !== this.owner && Math.hypot(u.x-this.x, u.y-this.y) < this.type.radius + u.type.radius + 10) this.target = u; });
        if (this.type.isCannon && !this.target) {
            let range = 250;
            let t = units.find(u => u.owner !== this.owner && Math.hypot(u.x-this.x, u.y-this.y) < range) || obstacles.find(o => o.active && Math.hypot(o.x-this.x, o.y-this.y) < range);
            if (t) {
                if (++this.cooldown > this.type.interval) {
                    bullets.push({x:this.x, y:this.y, tx:t.x, ty:t.y, owner:this.owner, atk:this.type.atk, active:true, life:0});
                    this.cooldown = 0;
                }
                blocked = true;
            }
        }
        if (this.target) {
            if (++this.cooldown >= this.type.interval) {
                this.target.hp -= this.type.atk;
                if (this.type.isBomb) { this.active = false; effects.push({x:this.target.x, y:this.target.y, life:15}); }
                this.cooldown = 0;
            }
        } else if (!blocked) {
            if (this.type.jitter) this.vy = Math.sin(gameTime*0.1)*0.5;
            this.x += this.vx; this.y += this.vy;
        }
        if (this.hp <= 0) this.active = false;
        if (this.x < 30 || this.x > canvas.width - 30) { players[this.x < 30 ? 2 : 1].hp -= 100; this.active = false; }
    }
    draw() {
        ctx.save(); ctx.globalAlpha = (this.type.name === "影") ? 0.4 : 1.0;
        ctx.translate(this.x, this.y);
        ctx.font = `${this.type.radius * 2.2}px serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(EMOJI[this.type.name], 0, 0);
        ctx.fillStyle = "white"; ctx.fillRect(-12, -this.type.radius - 10, 24, 3);
        ctx.fillStyle = this.owner === 1 ? "#2e86de" : "#ff4757"; ctx.fillRect(-12, -this.type.radius - 10, 24 * (this.hp/this.maxHp), 3);
        ctx.restore();
    }
}

function loop() {
    if (!gameRunning) return;
    gameTime++; ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#1b3d17"; ctx.fillRect(0,0,canvas.width,canvas.height);

    const pType = players[myRole].deck[players[myRole].selected];
    const spawnRangeX = myRole === 1 ? canvas.width - 100 - (canvas.width/2 - 100) * pType.range : 100 + (canvas.width/2 - 100) * pType.range;
    ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
    if(myRole === 1) ctx.fillRect(spawnRangeX, 0, canvas.width - spawnRangeX, canvas.height);
    else ctx.fillRect(0, 0, spawnRangeX, canvas.height);

    [1, 2].forEach(id => {
        players[id].mp = Math.min(100, players[id].mp + mpRegen);
        document.getElementById(`mp${id}-fill`).style.height = players[id].mp + '%';
        document.getElementById(`hp${id}-fill`).style.width = (players[id].hp/baseMaxHp*100) + '%';
        if (players[id].hp <= 0 && gameRunning) {
            gameRunning = false;
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('result-title').innerText = id === 1 ? "RED WIN!" : "BLUE WIN!";
        }
    });

    obstacles.forEach(o => {
        if (!o.active) { if (++o.timer > 400) { o.active = true; o.hp = o.maxHp; o.timer = 0; } return; }
        ctx.font = `${o.r * 1.8}px serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(EMOJI.obs, o.x, o.y);
        if (o.hp <= 0) { o.active = false; effects.push({x:o.x, y:o.y, life:15}); }
    });

    units.forEach(u => { u.update(); u.draw(); });
    units = units.filter(u => u.active);

    bullets.forEach(b => {
        let a = Math.atan2(b.ty-b.y, b.tx-b.x); b.x += Math.cos(a)*10; b.y += Math.sin(a)*10; b.life++;
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fillStyle = b.owner === 1 ? "#54a0ff" : "#ff6b6b"; ctx.fill();
        obstacles.forEach(o => { if(o.active && Math.hypot(b.x-o.x, b.y-o.y)<o.r){ o.hp-=b.atk; b.active=false; }});
        units.forEach(u => { if(u.owner!==b.owner && Math.hypot(b.x-u.x, b.y-u.y)<u.type.radius){ u.hp-=b.atk; b.active=false; }});
        if (b.life > 100) b.active = false;
    });
    bullets = bullets.filter(b => b.active);
    effects.forEach(e => { ctx.font = "40px serif"; ctx.fillText("💥", e.x, e.y); e.life--; });
    effects = effects.filter(e => e.life > 0);
    requestAnimationFrame(loop);
}

canvas.addEventListener('mousedown', e => {
    if (!gameRunning || !myRole) return;
    const pType = players[myRole].deck[players[myRole].selected];
    const canSpawn = myRole === 1 ? e.clientX > (canvas.width - 100 - (canvas.width/2 - 100) * pType.range) : e.clientX < (100 + (canvas.width/2 - 100) * pType.range);
    
    if (canSpawn && players[myRole].mp >= pType.cost) {
        units.push(new Unit(e.clientX, e.clientY, myRole, pType));
        players[myRole].mp -= pType.cost;
        socket.emit('spawn', { x: e.clientX, y: e.clientY, owner: myRole, name: pType.name });
    }
});
</script>
</body>
</html>
